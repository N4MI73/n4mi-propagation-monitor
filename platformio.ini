; N4MI Desktop Instrument Series - Propagation Monitor
; Phase 1 (display + interrupt-driven encoder) complete and confirmed
; working on real hardware, including the encoder reliability fix.
;
; Board: LilyGO T-Encoder Pro (ESP32-S3-R8, 16MB flash, 8MB OPI PSRAM)
;
; PLATFORM NOTE: Using pioarduino community fork, NOT official platformio
; espressif32. Reason: current Arduino_GFX (needed for Arduino_CO5300
; support) requires ESP32 Arduino core 3.x headers (esp32-hal-periman.h).
; Official PlatformIO espressif32 only supports core 2.x -- confirmed via
; a real build failure on 2026-06-28. pioarduino fills this gap.
;
; WINDOWS LONG PATH NOTE: Requires Windows long path support enabled
; (registry LongPathsEnabled = 1) -- fixed on admin computer 2026-06-28.
;
; WI-FI/HTTP NOTE (2026-07-15): WiFi.h and HTTPClient.h ship with the
; ESP32 Arduino core itself -- no lib_deps entry needed for either.
; ArduinoJson is the one genuinely external dependency added for the
; real PropMon fetch, pinned to major version 7 (modern JsonDocument
; API, no template size argument needed).

[env:tencoder-pro]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = huge_app.csv
board_upload.flash_size = 16MB

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -mfix-esp32-psram-cache-issue

lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/SensorLib @ 0.1.4
    bblanchon/ArduinoJson @ ^7
